name: Update README Desktop Preview

on:
  push:
    branches: [main]
    paths:
      - 'docs/images/desktop_ui/**'
      - 'scripts/docs/update-desktop-preview.mjs'
      - '.github/workflows/update-readme-preview.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-preview
  cancel-in-progress: true

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate desktop preview tables
        run: npm run docs:update-desktop-preview

      - name: Commit README updates
        run: |
          if git diff --quiet -- README.md README.en.md; then
            echo "README desktop preview already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.en.md
          git commit -m "docs: update desktop preview"
          git push
